# theme.conf
# Light Theme Configuration for the Unified Desktop Environment (UDE)

# General theme settings
theme_name = "Light Theme"
theme_description = "A bright and vibrant theme for the daytime."

# Background color for the desktop
desktop_background_color = "#FFFFFF"
desktop_background_image = "/path/to/light-theme-wallpaper.jpg"

# Taskbar color and settings
taskbar_color = "#FFEB3B"  # Light yellow
taskbar_opacity = 1.0

# Window borders and buttons
window_border_color = "#E3F2FD"  # Light blue
window_button_color = "#FFFFFF"

# Icon set
icon_set = "light-icons"
icon_directory = "/path/to/light-theme-icons/"

# ude-config.conf
# Main configuration file for the Unified Desktop Environment (UDE)

# -------------------- General Settings --------------------
[general]
# The default theme to use when no time-based themes are active
default_theme = "light-theme"

# Enable or disable automatic theme switching based on time of day
enable_time_based_theme_switch = true

# -------------------- Taskbar Settings --------------------
[taskbar]
# Taskbar color (hex code)
color = "#4CAF50"

# Taskbar orientation (top, bottom, left, right)
orientation = "bottom"

# Taskbar icon placement (left, center, right)
icon_placement = "center"

# Taskbar hiding behavior
hiding_enabled = true
hiding_timeout = 2  # seconds of inactivity

# -------------------- Desktop Settings --------------------
[desktop]
# Background color or image for the desktop
background_color = "#FFFFFF"
background_image = "/path/to/wallpaper.jpg"

# Desktop icon placement (auto, manual)
icon_placement = "auto"

# Desktop icon hiding behavior
icon_hiding_enabled = true
icon_hiding_timeout = 5  # seconds of inactivity

# -------------------- Time-Based Theme Switching --------------------
[themes]
# Time-based theme settings
morning_theme = "light-theme"
afternoon_theme = "neutral-theme"
evening_theme = "dark-theme"

# Time frames (in 24-hour format)
morning_start_time = "06:00"
afternoon_start_time = "12:00"
evening_start_time = "18:00"
night_start_time = "00:00"

# time-based-config.conf
# Configuration for time-based theme switching in the Unified Desktop Environment (UDE)

# Morning theme (default for the morning hours)
morning_theme = "light-theme"

# Afternoon theme (default for the afternoon hours)
afternoon_theme = "neutral-theme"

# Evening theme (default for the evening hours)
evening_theme = "dark-theme"

# Night theme (default for the night hours)
night_theme = "dark-theme"

# -------------------- Timeframes --------------------
# Timeframes for automatic theme switching (24-hour format)
# Theme will change based on system time.

morning_start = "06:00"
afternoon_start = "12:00"
evening_start = "18:00"
night_start = "00:00"

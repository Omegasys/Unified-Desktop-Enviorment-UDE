# time-based-sample.conf
# Example configuration file for time-based theme switching in UDE

# Morning theme (used from 06:00 AM to 11:59 AM)
morning_theme = "light-theme"
morning_start = "06:00"
morning_end = "11:59"

# Afternoon theme (used from 12:00 PM to 05:59 PM)
afternoon_theme = "neutral-theme"
afternoon_start = "12:00"
afternoon_end = "17:59"

# Evening theme (used from 06:00 PM to 11:59 PM)
evening_theme = "dark-theme"
evening_start = "18:00"
evening_end = "23:59"

# Night theme (used from 12:00 AM to 05:59 AM)
night_theme = "dark-theme"
night_start = "00:00"
night_end = "05:59"

# -------------------- Optional Settings --------------------

# Enable or disable automatic theme switching based on time of day
enable_time_based_theme_switch = true

# Time format: 24-hour format (HH:MM)
# Example: "06:00" for 6 AM, "18:00" for 6 PM

# -------------------- Example Explanation --------------------
#
# - From 06:00 AM to 11:59 AM, UDE will use the "light-theme" theme.
# - From 12:00 PM to 05:59 PM, UDE will switch to the "neutral-theme".
# - From 06:00 PM to 11:59 PM, UDE will switch to the "dark-theme".
# - From 12:00 AM to 05:59 AM, the "dark-theme" will be applied.
#
# The times are based on your system's local time.
